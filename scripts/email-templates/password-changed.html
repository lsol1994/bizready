<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>비밀번호 변경 완료 | BizReady</title>
</head>
<body style="margin:0;padding:0;background:#f0f9ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f9ff;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">

          <!-- 로고 헤더 -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:linear-gradient(135deg,#0ea5e9,#2563eb);border-radius:16px;padding:14px 20px;" align="center">
                    <span style="font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">💼 BizReady</span>
                  </td>
                </tr>
              </table>
              <p style="margin:10px 0 0;font-size:13px;color:#64748b;">경영지원 신규 입사자 올인원 아카이브</p>
            </td>
          </tr>

          <!-- 메인 카드 -->
          <tr>
            <td style="background:#ffffff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,0.08);padding:40px 36px;">

              <!-- 아이콘 -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:20px;">
                    <div style="display:inline-block;background:#f0fdf4;border-radius:50%;width:64px;height:64px;line-height:64px;text-align:center;font-size:28px;">✅</div>
                  </td>
                </tr>
              </table>

              <h1 style="margin:0 0 8px;font-size:22px;font-weight:800;color:#1e3a5f;text-align:center;">비밀번호가 변경되었습니다</h1>
              <p style="margin:0 0 28px;font-size:14px;color:#64748b;text-align:center;line-height:1.6;">
                <strong>{{ .Email }}</strong> 계정의 비밀번호가<br/>성공적으로 변경되었습니다.
              </p>

              <!-- 경고 박스 -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
                <tr>
                  <td style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:16px 20px;">
                    <p style="margin:0;font-size:13px;color:#991b1b;line-height:1.8;">
                      🚨 &nbsp;<strong>본인이 변경하지 않으셨나요?</strong><br/>
                      즉시 BizReady에 접속하여 비밀번호를 다시 변경하고<br/>계정 보안을 확인하세요.
                    </p>
                  </td>
                </tr>
              </table>

              <!-- 버튼 -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .SiteURL }}/login"
                      style="display:inline-block;background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;padding:14px 40px;border-radius:12px;">
                      🔑 &nbsp; 로그인하기
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#94a3b8;line-height:1.8;">
                © 2025 BizReady &nbsp;·&nbsp; 경영지원 아카이브 서비스<br/>
                <a href="{{ .SiteURL }}" style="color:#60a5fa;text-decoration:none;">bizready.pages.dev</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
